<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江海有岸 团圆可盼 ✉️</title>
    <style>
        /* 导入古风楷体字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ede3cb; /* 温暖的老纸浆背景色 */
            font-family: 'Noto Serif SC', 'Kaiti', 'STKaiti', serif;
            overflow: hidden;
            user-select: none;
        }

        /* 侨批信笺主体 */
        .card {
            width: 85%;
            max-width: 400px;
            background-color: #faf6eb; /* 宣纸白 */
            padding: 35px 25px;
            border-radius: 4px; /* 传统信笺不使用大圆角 */
            border: 2px solid #8a1f1f; /* 复古红边框 */
            box-shadow: 0 10px 30px rgba(94, 69, 44, 0.2);
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        /* 传统信笺的红框装饰 */
        .card::before {
            content: "";
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid #8a1f1f;
            pointer-events: none;
        }

        /* 复古红色邮戳印章 */
        .stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            border: 2px solid #8a1f1f;
            color: #8a1f1f;
            font-size: 0.8rem;
            padding: 5px;
            border-radius: 50%;
            transform: rotate(-15deg);
            font-weight: bold;
            letter-spacing: 2px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            box-shadow: inset 0 0 4px rgba(138, 31, 31, 0.2);
        }

        /* 信件内容区 */
        .letter-content {
            text-align: left;
            line-height: 1.9;
            color: #2b2b2b;
            font-size: 0.95rem;
            margin: 20px 0;
            min-height: 250px;
            animation: fadeIn 0.5s ease;
        }

        /* 电影台词红线框 */
        .movie-quote {
            border-left: 3px solid #8a1f1f;
            padding-left: 12px;
            color: #555;
            margin-bottom: 20px;
            font-size: 0.88rem;
            line-height: 1.6;
            background: #fdfaf2;
            padding-top: 8px;
            padding-bottom: 8px;
        }

        .page-num {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        /* 第二幕：特权汇款单（默认隐藏） */
        #prize-scene {
            display: none;
        }

        /* 汇款凭证框 */
        .voucher-card {
            border: 1px dashed #8a1f1f;
            padding: 20px;
            background-color: #fdfaf2;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #8a1f1f;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(138,31,31,0.05);
        }

        h1 {
            color: #8a1f1f;
            font-size: 1.35rem;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            height: 45px;
            z-index: 20;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 2px; /* 传统直角风格 */
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-primary {
            background-color: #8a1f1f;
            color: #faf6eb;
            box-shadow: 0 4px 10px rgba(138, 31, 31, 0.3);
            width: 100%;
        }

        #no-btn {
            background-color: #e0d9c5;
            color: #555;
            position: absolute;
            border: 1px solid #c4ba9e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 第一幕：多页侨批家书 -->
    <div class="card" id="letter-scene">
        <div class="stamp">平安</div>
        <h1 id="letter-title">吾爱 寄家书 ✉️</h1>
        <div class="page-num" id="page-indicator">（第一联 / 共三联）</div>
        
        <div class="letter-content" id="letter-text">
            <!-- 动态载入情书内容 -->
        </div>
        
        <button class="btn-primary" id="next-btn" onclick="nextPage()">阅下一联 ✉️</button>
    </div>

    <!-- 第二幕：特权汇单 -->
    <div class="card" id="prize-scene">
        <div class="stamp" style="top: 15px; right: 15px;">批银</div>
        <h1>五二零 · 专属汇兑单</h1>
        <div style="color: #666; font-size: 0.8rem; margin-top: 5px; letter-spacing: 1px;">凭此单向家属支取520特权，凭截图兑现</div>
        
        <div class="voucher-card" id="display-area">
            ✉️ 批银汇兑，点击下方支取
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="draw-btn" onclick="drawPrize()" style="width: auto;">支取特权</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">罢收此单</button>
        </div>
    </div>

    <script>
        const letterScene = document.getElementById('letter-scene');
        const prizeScene = document.getElementById('prize-scene');
        const letterText = document.getElementById('letter-text');
        const letterTitle = document.getElementById('letter-title');
        const pageIndicator = document.getElementById('page-indicator');
        const nextBtn = document.getElementById('next-btn');
        const noBtn = document.getElementById('no-btn');
        const displayArea = document.getElementById('display-area');
        const drawBtn = document.getElementById('draw-btn');

        // 初始化“不需要”按钮位置
        noBtn.style.left = '65%';
        noBtn.style.top = '0';

        // 侨批风三页情书内容
        const letterPages = [
            {
                title: "吾爱 展信安 ✉️",
                indicator: "（第一联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “行船入夜，恰江上升明月，似与你并肩共赏。江海万里，心中念你，便不觉遥远。” ——《给阿嬷的情书》
                    </div>
                    <p>见字如面。平日里朝夕相对，那些温热的话语反而被藏进了琐碎的生计中，鲜少对你提及。</p>
                    <p>电影里，那些跨越山海的批信，写满了克制与思念。虽然我们不曾分离于江海两端，但只要想到每一个晚归的夜里有你守望，心中便觉江海有岸，落脚有家。</p>
                `
            },
            {
                title: "纸短情长 ✉️",
                indicator: "（第二联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “我心只有一个，一心不能二用，今生可与你结伴，我已万分满足，有你牵挂，何言孤苦。” ——《给阿嬷的情书》
                    </div>
                    <p>阿嬷在信中琐碎念叨着“番薯肥美，孩子们半夜嬉闹”的寻常生活，每一个字，都是对远方良人的牵挂。</p>
                    <p>我也时常想起我们的一餐一饭、深夜抢被子的嬉闹。能执手同行在这个不大不小的世界里，于柴米油盐中相守，我亦万分满足。</p>
                `
            },
            {
                title: "执手白头 ✉️",
                indicator: "（第三联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “心有所寄，身若比邻，切要平安，即为团圆。” ——《给阿嬷的情书》
                    </div>
                    <p>只要有你在，每一个寻常的温热日子，都是团圆。谢谢你陪伴我走过风雨同舟的春秋。余生漫漫，我们还要一起走过更多四季。</p>
                    <p>古时侨批，既有书信，亦附汇银。今日五二零，这封手书是我最真挚的表白。另外，我还随信附上了一张“专属特权汇兑单”，请吾爱查收……</p>
                `
            }
        ];

        let currentPage = 0;

        function loadPage(pageIndex) {
            letterText.style.animation = 'none';
            void letterText.offsetWidth; 
            letterText.innerHTML = letterPages[pageIndex].content;
            letterTitle.innerText = letterPages[pageIndex].title;
            pageIndicator.innerText = letterPages[pageIndex].indicator;
            letterText.style.animation = 'fadeIn 0.5s ease';

            if (pageIndex === letterPages.length - 1) {
                nextBtn.innerText = "开启 520 汇兑单 🎁";
            } else {
                nextBtn.innerText = "阅下一联 ✉️";
            }
        }

        loadPage(0);

        function nextPage() {
            if (currentPage < letterPages.length - 1) {
                currentPage++;
                loadPage(currentPage);
            } else {
                enterPrizeScene();
            }
        }

        function enterPrizeScene() {
            letterScene.style.opacity = '0';
            setTimeout(() => {
                letterScene.style.display = 'none';
                prizeScene.style.display = 'block';
                prizeScene.style.opacity = '1';
            }, 500);
        }

        // 侨批风格特权池
        const prizes = [
            "🧹 凭此单兑换：【家务全包免单券】1张（今日内有效）",
            "💆‍♂️ 凭此单兑换：【私人专属捶背按摩 30 分钟】",
            "🛒 凭此单兑换：【购物车宝贝代付代清空】",
            "🍲 凭此单兑换：【今晚餐厅外卖决定权】",
            "☕ 凭此单兑换：【早起茶水端到床头服务】",
            "🤫 凭此单兑换：【无条件停止唠叨、免责卡一次】"
        ];

        let clickCount = 0;

        function drawPrize() {
            clickCount++;
            
            let timer = setInterval(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                displayArea.innerHTML = randomPrize;
            }, 80);

            setTimeout(() => {
                clearInterval(timer);
                
                if (clickCount === 1) {
                    displayArea.innerHTML = "🎁 兑得契据：<br>【家务全包免单券】 1 张！";
                    drawBtn.innerText = "再行支取";
                } else if (clickCount === 2) {
                    displayArea.innerHTML = "🎁 兑得契据：<br>【私人专属按摩 30 分钟】！";
                    drawBtn.innerText = "最后一试";
                } else {
                    displayArea.innerHTML = "✨ 银票额度已满 ✨<br>请截图保存，今晚向我如实兑现！";
                    drawBtn.style.display = 'none';
                    noBtn.style.display = 'none';
                }
            }, 1000);
        }

        // 躲避按钮
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
