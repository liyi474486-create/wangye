<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>520 家属专属福利社 ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
            font-family: 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .container {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(233, 150, 150, 0.2);
            max-width: 85%;
            z-index: 10;
        }

        h1 {
            color: #d87093;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* 卡片样式，用于展示抽到的福利 */
        .voucher-card {
            border: 2px dashed #ffb6c1;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff9fa;
            margin: 20px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #c71585;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.95rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #draw-btn {
            background-color: #db7093;
            color: white;
            box-shadow: 0 5px 15px rgba(219, 112, 147, 0.3);
        }

        #no-btn {
            background-color: #eee;
            color: #666;
            position: absolute;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>520 领导专属福利社 👑</h1>
        <div class="subtitle">致：携手同行的小家庭守护者</div>
        
        <div class="voucher-card" id="display-area">
            🎁 点击下方按钮，抽取今日专属福利
        </div>
        
        <div class="buttons">
            <button id="draw-btn" onclick="drawPrize()">抽取今日特权</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">不需要福利</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('no-btn');
        const displayArea = document.getElementById('display-area');
        const drawBtn = document.getElementById('draw-btn');

        // 设置“不需要”按钮的初始位置
        noBtn.style.left = '60%';
        noBtn.style.top = '0';

        // 夫妻趣味福利池
        const prizes = [
            "🧹 获得【家务全包免单券】1张（今天我全包）",
            "💆‍♂️ 获得【私人专属捶背按摩 30 分钟】",
            "🛒 获得【购物车宝贝代付代清空】(限额内)",
            "🍲 获得【今晚餐厅外卖决定权（不许说随便）】",
            "☕ 获得【早起咖啡/热茶端到床头服务】",
            "🤫 获得【无条件免责、停止唠叨一次】",
            "🎬 获得【今晚电视遥控器独家支配权】"
        ];

        let clickCount = 0;

        function drawPrize() {
            clickCount++;
            
            // 产生抽奖动画效果
            let timer = setInterval(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                displayArea.innerHTML = randomPrize;
            }, 100);

            // 1秒后停止抽奖并确定结果
            setTimeout(() => {
                clearInterval(timer);
                
                if (clickCount === 1) {
                    displayArea.innerHTML = "🎁 恭喜获得：<br>【家务全包免单券】 1 张！";
                    drawBtn.innerText = "再抽一次";
                } else if (clickCount === 2) {
                    displayArea.innerHTML = "🎁 恭喜再次获得：<br>【私人专属按摩 30 分钟】！";
                    drawBtn.innerText = "最后一次机会";
                } else {
                    displayArea.innerHTML = "✨ 今日福利已领满 ✨<br>请截图保存向我兑换，解释权归本家庭所有！";
                    drawBtn.style.display = 'none';
                    noBtn.style.display = 'none';
                }
            }, 1000);
        }

        // “不需要福利”按钮躲避逻辑
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
