<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给阿嬷的情书 ✉️ 520专属</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #fff5f5, #ffe4e1);
            font-family: 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.96);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(233, 150, 150, 0.15);
            text-align: center;
            transition: all 0.5s ease;
        }

        /* 第一幕：情书样式 */
        .letter-content {
            text-align: left;
            line-height: 1.8;
            color: #444;
            font-size: 0.95rem;
            margin: 20px 0;
            min-height: 180px;
        }

        .movie-quote {
            border-left: 3px solid #db7093;
            padding-left: 12px;
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
            font-size: 0.9rem;
            line-height: 1.6;
            background: #fff9fa;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        /* 第二幕：福利抽奖（默认隐藏） */
        #prize-scene {
            display: none;
        }

        .voucher-card {
            border: 2px dashed #ffb6c1;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff9fa;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #c71585;
            font-weight: bold;
        }

        h1 {
            color: #db7093;
            font-size: 1.5rem;
            margin: 0 0 10px 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            height: 45px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #db7093;
            color: white;
            box-shadow: 0 5px 15px rgba(219, 112, 147, 0.3);
            width: 100%;
        }

        #no-btn {
            background-color: #eee;
            color: #666;
            position: absolute;
        }
    </style>
</head>
<body>

    <!-- 第一幕：浪漫情书 -->
    <div class="card" id="letter-scene">
        <h1>《给阿嬷的情书》✉️</h1>
        <div class="letter-content">
            <div class="movie-quote">
                “行船入夜，恰江上升明月，似与你并肩共赏。江海万里，心中念你，便不觉遥远。”
                <br>
                <span style="font-size: 0.8rem; color: #999; display: block; text-align: right; margin-top: 5px;">—— 电影《给阿嬷的情书》</span>
            </div>
            <p>
                电影里说：“江海有岸，团圆可盼。” 以前听这些话总觉得遥远，但在和你在一个屋檐下、过着柴米油盐平凡日子的这些年里，我才渐渐读懂了“相守”的重量。
            </p>
            <p>
                谢谢你包容我、体贴我，在每一个普通的日常里给我最温暖的依靠。在这个 520，我想把这封“情书”送给你，也顺便带了一些只属于你的小惊喜……
            </p>
        </div>
        <button class="btn-primary" onclick="enterPrizeScene()">拆开 520 福利 🎁</button>
    </div>

    <!-- 第二幕：福利抽奖 -->
    <div class="card" id="prize-scene">
        <h1>520 领导专属福利社 👑</h1>
        <div style="color: #888; font-size: 0.85rem;">温馨提示：抽中的福利不许耍赖，截图有效</div>
        
        <div class="voucher-card" id="display-area">
            🎁 专属福利等待抽取中
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="draw-btn" onclick="drawPrize()" style="width: auto;">抽取福利</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">不需要福利</button>
        </div>
    </div>

    <script>
        const letterScene = document.getElementById('letter-scene');
        const prizeScene = document.getElementById('prize-scene');
        const noBtn = document.getElementById('no-btn');
        const displayArea = document.getElementById('display-area');
        const drawBtn = document.getElementById('draw-btn');

        // 初始化“不需要”按钮位置
        noBtn.style.left = '65%';
        noBtn.style.top = '0';

        // 切换到抽奖场景
        function enterPrizeScene() {
            letterScene.style.opacity = '0';
            setTimeout(() => {
                letterScene.style.display = 'none';
                prizeScene.style.display = 'block';
                prizeScene.style.opacity = '1';
            }, 500);
        }

        // 夫妻趣味福利池
        const prizes = [
            "🧹 获得【家务全包免单券】1张（今天我全包）",
            "💆‍♂️ 获得【私人专属捶背按摩 30 分钟】",
            "🛒 获得【购物车宝贝代付代清空】",
            "🍲 获得【今晚餐厅外卖决定权】",
            "☕ 获得【早起咖啡/热茶端到床头服务】",
            "🤫 获得【无条件停止唠叨、免责卡一次】"
        ];

        let clickCount = 0;

        function drawPrize() {
            clickCount++;
            
            let timer = setInterval(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                displayArea.innerHTML = randomPrize;
            }, 80);

            setTimeout(() => {
                clearInterval(timer);
                
                if (clickCount === 1) {
                    displayArea.innerHTML = "🎁 恭喜获得：<br>【家务全包免单券】 1 张！";
                    drawBtn.innerText = "再抽一次";
                } else if (clickCount === 2) {
                    displayArea.innerHTML = "🎁 恭喜再次获得：<br>【私人专属按摩 30 分钟】！";
                    drawBtn.innerText = "最后一次机会";
                } else {
                    displayArea.innerHTML = "✨ 今日福利已领满 ✨<br>快截图发给我，今晚开始逐一兑现！";
                    drawBtn.style.display = 'none';
                    noBtn.style.display = 'none';
                }
            }, 1000);
        }

        // “不需要福利”按钮躲避逻辑
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
