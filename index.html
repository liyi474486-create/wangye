<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给阿嬷的情书 ✉️ 520专属</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #fff5f5, #ffe4e1);
            font-family: 'Georgia', 'FandolSong', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .card {
            width: 85%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.96);
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(233, 150, 150, 0.15);
            text-align: center;
            transition: all 0.5s ease;
        }

        /* 第一幕：多页情书样式 */
        .letter-content {
            text-align: left;
            line-height: 1.8;
            color: #444;
            font-size: 0.95rem;
            margin: 20px 0;
            min-height: 240px;
            animation: fadeIn 0.5s ease;
        }

        .movie-quote {
            border-left: 3px solid #db7093;
            padding-left: 12px;
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
            font-size: 0.88rem;
            line-height: 1.6;
            background: #fff9fa;
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .page-num {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 15px;
        }

        /* 第二幕：福利抽奖（默认隐藏） */
        #prize-scene {
            display: none;
        }

        .voucher-card {
            border: 2px dashed #ffb6c1;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff9fa;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #c71585;
            font-weight: bold;
        }

        h1 {
            color: #db7093;
            font-size: 1.4rem;
            margin: 0;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            height: 45px;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #db7093;
            color: white;
            box-shadow: 0 5px 15px rgba(219, 112, 147, 0.3);
            width: 100%;
        }

        #no-btn {
            background-color: #eee;
            color: #666;
            position: absolute;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 第一幕：多页情书场景 -->
    <div class="card" id="letter-scene">
        <h1 id="letter-title">给妻家书 ✉️</h1>
        <div class="page-num" id="page-indicator">（第一页 / 共三页）</div>
        
        <div class="letter-content" id="letter-text">
            <!-- 动态载入情书内容 -->
        </div>
        
        <button class="btn-primary" id="next-btn" onclick="nextPage()">读下一封 ✉️</button>
    </div>

    <!-- 第二幕：福利抽奖场景 -->
    <div class="card" id="prize-scene">
        <h1>520 领导专属福利社 👑</h1>
        <div style="color: #888; font-size: 0.85rem; margin-top: 5px;">温馨提示：抽中的福利不许耍赖，截图有效</div>
        
        <div class="voucher-card" id="display-area">
            🎁 专属福利等待抽取中
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="draw-btn" onclick="drawPrize()" style="width: auto;">抽取福利</button>
            <button id="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">不需要福利</button>
        </div>
    </div>

    <script>
        const letterScene = document.getElementById('letter-scene');
        const prizeScene = document.getElementById('prize-scene');
        const letterText = document.getElementById('letter-text');
        const letterTitle = document.getElementById('letter-title');
        const pageIndicator = document.getElementById('page-indicator');
        const nextBtn = document.getElementById('next-btn');
        const noBtn = document.getElementById('no-btn');
        const displayArea = document.getElementById('display-area');
        const drawBtn = document.getElementById('draw-btn');

        // 初始化“不需要”按钮位置
        noBtn.style.left = '65%';
        noBtn.style.top = '0';

        // 三页情书的数据集
        const letterPages = [
            {
                title: "吾爱 展信安 ✉️",
                indicator: "（第一页 / 共三页）",
                content: `
                    <div class="movie-quote">
                        “行船入夜，恰江上升明月，似与你并肩共赏。江海万里，心中念你，便不觉遥远。” ——《给阿嬷的情书》
                    </div>
                    <p>见字如晤。平日里朝夕相伴，有些滚烫的念想，反而被藏进了柴米油盐的琐碎里，鲜少对你提及。</p>
                    <p>电影里，那些跨越山海的信，写满了克制与思念。而在我们的日子里，虽然没有漂洋过海的距离，但只要想到每一个推开门回家的夜里都有你在，心中便觉江海有岸，落脚有家。</p>
                `
            },
            {
                title: "纸短情长 ✉️",
                indicator: "（第二页 / 共三页）",
                content: `
                    <div class="movie-quote">
                        “我心只有一个，一心不能二用，今生可与你结伴，我已万分满足，有你牵挂，何言孤苦。” ——《给阿嬷的情书》
                    </div>
                    <p>电影里，阿嬷淑柔在信中细细碎碎地写着“番薯肥美，孩子们半夜偷啃嬉闹”的寻常风景，远方的阿公看信便如临其境。</p>
                    <p>我也时常想起我们的一餐一饭，那些抢被子的深夜、为吃什么争执的傍晚。这些“浅话”，在年岁里流淌成最深的意长。能执子之手，在这个不大不小的世界里同行，已是极大的知足。</p>
                `
            },
            {
                title: "执手白头 ✉️",
                indicator: "（第三页 / 共三页）",
                content: `
                    <div class="movie-quote">
                        “暹罗虽远，心有所寄，身若比邻，切要平安，即为团圆。” ——《给阿嬷的情书》
                    </div>
                    <p>只要有你在，每一个寻常的温热日子，都是团圆。谢谢你陪伴我走过风雨同舟的春秋。余生漫漫，我们还要一起看更多风景。</p>
                    <p>今日520，这封手书是我最真挚的表白。不过，除了纸短情长，生活总需要有些实在的欢喜。为了犒劳我最亲爱的“领导”，我特地在后页备了一份专属福利，请查收……</p>
                `
            }
        ];

        let currentPage = 0;

        // 加载第一页
        function loadPage(pageIndex) {
            letterText.style.animation = 'none';
            // 触发重绘以重新运行动画
            void letterText.offsetWidth; 
            letterText.innerHTML = letterPages[pageIndex].content;
            letterTitle.innerText = letterPages[pageIndex].title;
            pageIndicator.innerText = letterPages[pageIndex].indicator;
            letterText.style.animation = 'fadeIn 0.5s ease';

            if (pageIndex === letterPages.length - 1) {
                nextBtn.innerText = "进入 520 福利社 🎁";
            } else {
                nextBtn.innerText = "读下一封 ✉️";
            }
        }

        // 初始化第一页
        loadPage(0);

        // 翻页逻辑
        function nextPage() {
            if (currentPage < letterPages.length - 1) {
                currentPage++;
                loadPage(currentPage);
            } else {
                enterPrizeScene();
            }
        }

        // 切换到抽奖场景
        function enterPrizeScene() {
            letterScene.style.opacity = '0';
            setTimeout(() => {
                letterScene.style.display = 'none';
                prizeScene.style.display = 'block';
                prizeScene.style.opacity = '1';
            }, 500);
        }

        // 趣味福利池
        const prizes = [
            "🧹 获得【家务全包免单券】1张（今天我全包）",
            "💆‍♂️ 获得【私人专属捶背按摩 30 分钟】",
            "🛒 获得【购物车宝贝代付代清空】",
            "🍲 获得【今晚餐厅外卖决定权】",
            "☕ 获得【早起咖啡/热茶端到床头服务】",
            "🤫 获得【无条件停止唠叨、免责卡一次】"
        ];

        let clickCount = 0;

        function drawPrize() {
            clickCount++;
            
            let timer = setInterval(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                displayArea.innerHTML = randomPrize;
            }, 80);

            setTimeout(() => {
                clearInterval(timer);
                
                if (clickCount === 1) {
                    displayArea.innerHTML = "🎁 恭喜获得：<br>【家务全包免单券】 1 张！";
                    drawBtn.innerText = "再抽一次";
                } else if (clickCount === 2) {
                    displayArea.innerHTML = "🎁 恭喜再次获得：<br>【私人专属按摩 30 分钟】！";
                    drawBtn.innerText = "最后一次机会";
                } else {
                    displayArea.innerHTML = "✨ 今日福利已领满 ✨<br>快截图发给我，今晚开始逐一兑现！";
                    drawBtn.style.display = 'none';
                    noBtn.style.display = 'none';
                }
            }, 1000);
        }

        // “不需要福利”按钮躲避逻辑
        function moveNoButton() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
