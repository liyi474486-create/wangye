<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江海有岸 团圆可盼 ✉️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ede3cb; 
            font-family: 'Noto Serif SC', 'Kaiti', 'STKaiti', serif;
            overflow: hidden;
            user-select: none;
        }

        .card {
            width: 85%;
            max-width: 400px;
            background-color: #faf6eb; 
            padding: 35px 25px;
            border-radius: 4px; 
            border: 2px solid #8a1f1f; 
            box-shadow: 0 10px 30px rgba(94, 69, 44, 0.2);
            text-align: center;
            position: relative;
            transition: all 0.5s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid #8a1f1f;
            pointer-events: none;
        }

        .stamp {
            position: absolute;
            top: 25px;
            right: 25px;
            border: 2px solid #8a1f1f;
            color: #8a1f1f;
            font-size: 0.8rem;
            padding: 5px;
            border-radius: 50%;
            transform: rotate(-15deg);
            font-weight: bold;
            letter-spacing: 2px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            box-shadow: inset 0 0 4px rgba(138, 31, 31, 0.2);
        }

        .letter-content {
            text-align: left;
            line-height: 1.9;
            color: #2b2b2b;
            font-size: 0.95rem;
            margin: 20px 0;
            min-height: 250px;
            animation: fadeIn 0.5s ease;
        }

        .movie-quote {
            border-left: 3px solid #8a1f1f;
            padding-left: 12px;
            color: #555;
            margin-bottom: 20px;
            font-size: 0.88rem;
            line-height: 1.6;
            background: #fdfaf2;
            padding-top: 8px;
            padding-bottom: 8px;
        }

        .page-num {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        #prize-scene {
            display: none;
        }

        .voucher-card {
            border: 1px dashed #8a1f1f;
            padding: 20px;
            background-color: #fdfaf2;
            margin: 20px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #8a1f1f;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(138,31,31,0.05);
        }

        h1 {
            color: #8a1f1f;
            font-size: 1.35rem;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            position: relative;
            height: 45px;
            z-index: 20;
        }

        button {
            padding: 10px 20px;
            font-size: 0.9rem;
            border: none;
            border-radius: 2px; 
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:disabled {
            background-color: #ccc !important;
            color: #888 !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        .btn-primary {
            background-color: #8a1f1f;
            color: #faf6eb;
            box-shadow: 0 4px 10px rgba(138, 31, 31, 0.3);
            width: 100%;
        }

        #no-btn {
            background-color: #e0d9c5;
            color: #555;
            position: absolute;
            border: 1px solid #c4ba9e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 第一幕：多页侨批家书 -->
    <div class="card" id="letter-scene">
        <div class="stamp">平安</div>
        <h1 id="letter-title">吾爱 寄家书 ✉️</h1>
        <div class="page-num" id="page-indicator">（第一联 / 共三联）</div>
        
        <div class="letter-content" id="letter-text">
            <!-- 动态载入 -->
        </div>
        
        <button class="btn-primary" id="next-btn" onclick="nextPage()">阅下一联 ✉️</button>
    </div>

    <!-- 第二幕：特权汇单 -->
    <div class="card" id="prize-scene">
        <div class="stamp" style="top: 15px; right: 15px;">批银</div>
        <h1>五二零 · 专属汇兑单</h1>
        <div style="color: #666; font-size: 0.8rem; margin-top: 5px; letter-spacing: 1px;">凭此单向家属支取520特权，凭截图兑现</div>
        
        <div class="voucher-card" id="display-area">
            ✉️ 批银汇兑，点击下方支取
        </div>
        
        <div class="buttons">
            <button class="btn-primary" id="draw-btn" onclick="drawPrize()" style="width: auto;">支取特权</button>
            <button id="no-btn" onmouseover="handleHover()" onclick="handleClick()">罢收此单</button>
        </div>
    </div>

    <script>
        const letterScene = document.getElementById('letter-scene');
        const prizeScene = document.getElementById('prize-scene');
        const letterText = document.getElementById('letter-text');
        const letterTitle = document.getElementById('letter-title');
        const pageIndicator = document.getElementById('page-indicator');
        const nextBtn = document.getElementById('next-btn');
        const noBtn = document.getElementById('no-btn');
        const displayArea = document.getElementById('display-area');
        const drawBtn = document.getElementById('draw-btn');

        noBtn.style.left = '65%';
        noBtn.style.top = '0';

        const letterPages = [
            {
                title: "吾爱 展信安 ✉️",
                indicator: "（第一联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “行船入夜，恰江上升明月，似与你并肩共赏。江海万里，心中念你，便不觉遥远。” ——《给阿嬷的情书》
                    </div>
                    <p>见字如面。平日里朝夕相对，那些温热的话语反而被藏进了琐碎的生计中，鲜少对你提及。</p>
                    <p>电影里，那些跨越山海的批信，写满了克制与思念。虽然我们不曾分离于江海两端，但只要想到每一个晚归的夜里有你守望，心中便觉江海有岸，落脚有家。</p>
                `
            },
            {
                title: "纸短情长 ✉️",
                indicator: "（第二联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “我心只有一个，一心不能二用，今生可与你结伴，我已万分满足，有你牵挂，何言孤苦。” ——《给阿嬷的情书》
                    </div>
                    <p>阿嬷在信中琐碎念叨着“番薯肥美，孩子们半夜嬉闹”的寻常生活，每一个字，都是对远方良人的牵挂。</p>
                    <p>我也时常想起我们的一餐一饭、深夜抢被子的嬉闹。能执手同行在这个不大不小的世界里，于柴米油盐中相守，我亦万分满足。</p>
                `
            },
            {
                title: "执手白头 ✉️",
                indicator: "（第三联 / 共三联）",
                content: `
                    <div class="movie-quote">
                        “心有所寄，身若比邻，切要平安，即为团圆。” ——《给阿嬷的情书》
                    </div>
                    <p>只要有你在，每一个寻常的温热日子，都是团圆。谢谢你陪伴我走过风雨同舟的春秋。余生漫漫，我们还要一起走过更多四季。</p>
                    <p>古时侨批，既有书信，亦附汇银。今日五二零，这封手书是我最真挚的表白。另外，我还随信附上了一张“专属特权汇兑单”，请吾爱查收……</p>
                `
            }
        ];

        let currentPage = 0;

        function loadPage(pageIndex) {
            letterText.style.animation = 'none';
            void letterText.offsetWidth; 
            letterText.innerHTML = letterPages[pageIndex].content;
            letterTitle.innerText = letterPages[pageIndex].title;
            pageIndicator.innerText = letterPages[pageIndex].indicator;
            letterText.style.animation = 'fadeIn 0.5s ease';

            if (pageIndex === letterPages.length - 1) {
                nextBtn.innerText = "开启 520 汇兑单 🎁";
            } else {
                nextBtn.innerText = "阅下一联 ✉️";
            }
        }

        loadPage(0);

        function nextPage() {
            if (currentPage < letterPages.length - 1) {
                currentPage++;
                loadPage(currentPage);
            } else {
                enterPrizeScene();
            }
        }

        function enterPrizeScene() {
            letterScene.style.opacity = '0';
            setTimeout(() => {
                letterScene.style.display = 'none';
                prizeScene.style.display = 'block';
                prizeScene.style.opacity = '1';
            }, 500);
        }

        // 福利池
        const prizes = [
            "🧹 扫洒庭除：【家务全包免单券】1张",
            "💆‍♂️ 活血化瘀：【私人专属捶背按摩 30分钟】",
            "🛒 钱粮全免：【超级大奖1888】",
            "🍲 膳食钦点：【无敌大奖2888】",
            "☕ 晨起问安：【早起茶水/咖啡端到床头】",
            "🤫 息事宁人：【终极大奖3888】"
        ];

        let isRunaway = true; // 是否处于逃跑状态
        let firstPrize = "";
        let finalPrize = "";
        let drawCount = 0;

        // 处理鼠标移入事件
        function handleHover() {
            if (isRunaway) {
                evade();
            }
        }

        // 处理点击事件
        function handleClick() {
            if (isRunaway) {
                evade();
            } else {
                drawPrize(); // 只有在非避让状态下，真实点击才触发重新抽奖
            }
        }

        // 按钮避让定位
        function evade() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 20);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 20);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function drawPrize() {
            drawBtn.disabled = true;
            noBtn.disabled = true;
            
            // 滚屏动画
            let timer = setInterval(() => {
                const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];
                displayArea.innerHTML = randomPrize;
            }, 80);

            setTimeout(() => {
                clearInterval(timer);
                drawBtn.disabled = false;
                noBtn.disabled = false;

                if (drawCount === 0) {
                    // 第一轮定格
                    drawCount = 1;
                    firstPrize = prizes[Math.floor(Math.random() * prizes.length)];
                    displayArea.innerHTML = `🎁 首次兑得：<br>${firstPrize}`;
                    
                    // 改变主按钮
                    drawBtn.innerText = "确定收下";
                    drawBtn.setAttribute("onclick", "confirmPrize()");
                    
                    // 改变辅按钮状态：关闭避让，重置样式，更名
                    isRunaway = false;
                    noBtn.style.position = 'static';
                    noBtn.style.left = 'auto';
                    noBtn.style.top = 'auto';
                    noBtn.innerText = "不满意更换";

                } else if (drawCount === 1) {
                    // 第二轮定格（更换）
                    drawCount = 2;
                    const remainingPrizes = prizes.filter(p => p !== firstPrize);
                    finalPrize = remainingPrizes[Math.floor(Math.random() * remainingPrizes.length)];
                    displayArea.innerHTML = `🎁 终极兑得：<br>${finalPrize}`;
                    
                    // 机会用尽，隐藏更换按钮
                    noBtn.style.display = 'none';
                }
            }, 1000); 
        }

        // 确定收下福利
        function confirmPrize() {
            const chosen = (drawCount === 2) ? finalPrize : firstPrize;
            displayArea.innerHTML = `🎉 终成契据！恭喜获得：<br>${chosen}<br><br>✨ 银票已盖印 ✨<br>快截图保存，向我兑现契据！`;
            drawBtn.style.display = 'none';
            noBtn.style.display = 'none';
        }
    </script>
</body>
</html>
